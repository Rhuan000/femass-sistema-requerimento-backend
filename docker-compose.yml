services:
  postgres:
    image: postgres:16
    container_name: femass-requerimento-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: femass-requerimento
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: femass-requerimento
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

    volumes:
      - femass-requerimento-data:/var/lib/postgresql/data



  backend:
    container_name: femass-requerimento-backend
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    environment:
      # Quarkus HTTP
      QUARKUS_HTTP_PORT: "${QUARKUS_HTTP_PORT:-8080}"

      # DB (Postgres) - defaults assume compose service 'postgres'
      QUARKUS_DATASOURCE_JDBC_URL: "${QUARKUS_DATASOURCE_JDBC_URL:-jdbc:postgresql://postgres:5432/femass-requerimento}"
      QUARKUS_DATASOURCE_USERNAME: "${QUARKUS_DATASOURCE_USERNAME:-postgres}"
      QUARKUS_DATASOURCE_PASSWORD: "${QUARKUS_DATASOURCE_PASSWORD:-femass-requerimento}"

      # MP Rest client for match-relevancia (maps to quarkus.rest-client.match-relevancia.url)
      QUARKUS_REST_CLIENT_MATCH_RELEVANCIA_URL: "${QUARKUS_REST_CLIENT_MATCH_RELEVANCIA_URL:-https://y1ww0xpk1g.execute-api.us-east-1.amazonaws.com}"

      # OIDC (Keycloak) - defaults point to compose keycloak service
      QUARKUS_OIDC_AUTH_SERVER_URL: "${QUARKUS_OIDC_AUTH_SERVER_URL:-http://keycloak:8080/realms/quarkus}"
      QUARKUS_OIDC_CLIENT_ID: "${QUARKUS_OIDC_CLIENT_ID:-backend-service}"
      QUARKUS_OIDC_CREDENTIALS_SECRET: "${QUARKUS_OIDC_CREDENTIALS_SECRET}"

      # CORS (optional) - defaults to local frontend origin; set QUARKUS_HTTP_CORS_ORIGINS to override
      QUARKUS_HTTP_CORS: "${QUARKUS_HTTP_CORS:-true}"
      QUARKUS_HTTP_CORS_ORIGINS: "${QUARKUS_HTTP_CORS_ORIGINS:-http://localhost:5173}"

    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  femass-requerimento-data:
